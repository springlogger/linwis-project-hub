/* ── Ring chart ── */
function RingChart({ pct, color, size = 44, stroke = 4 }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const dash = (pct / 100) * circ;
  return (
    <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" />
    </svg>
  );
}

/* ── Sparkline ── */
function Spark({ data, color }) {
  const W = 72, H = 32;
  const min = Math.min(...data), max = Math.max(...data);
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * W;
    const y = H - ((v - min) / (max - min + 1)) * H;
    return `${x},${y}`;
  }).join(' ');
  return (
    <svg width={W} height={H} style={{ overflow: 'visible' }}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

/* ── Avatar ── */
function Avatar({ name, size = 24, color }) {
  const initials = name.split(' ').map(n => n[0]).join('').slice(0, 2);
  const palette = ['#7045ba','#5f1ee2','#441f8e','#3b5fe2','#1e7a8e'];
  const c = color || palette[name.charCodeAt(0) % palette.length];
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%', background: c,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontSize: size * 0.38, fontWeight: 600, color: '#fff', flexShrink: 0,
      letterSpacing: '-0.01em',
    }}>{initials}</div>
  );
}

/* ── Badge ── */
function Badge({ label, variant = 'default' }) {
  const map = {
    high:        { bg: 'rgba(239,68,68,0.15)',   color: '#ef4444' },
    medium:      { bg: 'rgba(245,158,11,0.15)',  color: '#f59e0b' },
    low:         { bg: 'rgba(34,201,138,0.15)',  color: '#22c98a' },
    completed:   { bg: 'rgba(34,201,138,0.15)',  color: '#22c98a' },
    'in progress':{ bg: 'rgba(95,30,226,0.2)',   color: '#9b6cf7' },
    review:      { bg: 'rgba(245,158,11,0.15)',  color: '#f59e0b' },
    default:     { bg: 'rgba(112,69,186,0.2)',   color: '#a07de0' },
  };
  const s = map[variant.toLowerCase()] || map.default;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', padding: '2px 7px',
      borderRadius: 4, fontSize: 10, fontWeight: 600, letterSpacing: '0.02em',
      background: s.bg, color: s.color, textTransform: 'capitalize', whiteSpace: 'nowrap',
    }}>{label}</span>
  );
}

                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                      {m.load >= 85 && <span style={{ fontSize: 10, background: 'rgba(239,68,68,0.15)', color: '#ef4444', padding: '1px 6px', borderRadius: 4, fontWeight: 600 }}>Overloaded</span>}
                      <span style={{ fontSize: 13, fontWeight: 700, color: m.color }}>{m.load}%</span>
                    </div>
                  </div>
                  <div style={{ height: 5, background: 'var(--bg3)', borderRadius: 5, overflow: 'hidden' }}>
                    <div style={{ height: '100%', width: `${m.load}%`, background: m.color, borderRadius: 5 }}></div>

                </div>
              ))}
            </div>
          </div>

          {/* Suggested Actions */}
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 12, padding: '16px' }}>

            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {SUGGESTIONS.map((s, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', borderRadius: 9, background: 'var(--bg)', border: '1px solid var(--border)', transition: 'all 0.15s' }}

                  onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--border)'}
                >
                  <div style={{ width: 30, height: 30, borderRadius: 8, background: `${s.color}18`, border: `1px solid ${s.color}25`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={s.color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d={s.icon}/></svg>
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text)', marginBottom: 1 }}>{s.title}</div>
                    <div style={{ fontSize: 11, color: 'var(--text3)' }}>{s.desc}</div>
                  </div>
                  <button style={{ flexShrink: 0, padding: '4px 10px', borderRadius: 6, border: '1px solid var(--border)', background: 'var(--bg2)', color: 'var(--text2)', fontSize: 11, fontWeight: 600, fontFamily: 'Inter', cursor: 'pointer', whiteSpace: 'nowrap', transition: 'all 0.15s' }}
                    onMouseEnter={e => { e.currentTarget.style.background = 'var(--primary-light)'; e.currentTarget.style.borderColor = 'rgba(112,69,186,0.4)'; e.currentTarget.style.color = 'var(--text)'; }}
                    onMouseLeave={e => { e.currentTarget.style.background = 'var(--bg2)'; e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.color = 'var(--text2)'; }}
                  >{s.action}</button>
                </div>
              ))}
            </div>
          </div>

        </div>
      </div>
    </div>
  );
}

                      <span style={{ fontSize: 10, color: 'var(--text3)', width: 102, flexShrink: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{row.name}</span>
                      <div style={{ flex: 1, height: 16, position: 'relative', borderRadius: 4, background: 'var(--bg3)' }}>
                        <div style={{ position: 'absolute', top: 0, height: '100%', borderRadius: 4, left: `${row.start}%`, width: `${row.width}%`, background: row.color, opacity: 0.85 }}></div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Recent Activity */}
              <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 12, padding: '16px' }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
                  <span style={{ fontWeight: 700, fontSize: 14, color: 'var(--text)' }}>Recent Activity</span>
                  <span style={{ fontSize: 11, color: 'var(--primary)', cursor: 'pointer', fontWeight: 500 }}>View all →</span>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  {ACTIVITY.map((a, i) => (
                    <div key={i} style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>
                      <Avatar name={a.user} size={28} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: 'flex', flexWrap: 'wrap', alignItems: 'center', gap: 4, lineHeight: 1.5 }}>
                          <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text)' }}>{a.user}</span>
                          <span style={{ fontSize: 12, color: 'var(--text3)' }}>{a.action}</span>
                          <Badge label={a.target} variant={a.tag} />
                        </div>
                        <span style={{ fontSize: 10, color: 'var(--text3)' }}>{a.time}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

            </div>
          </div>

          {/* BOTTOM ROW */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>

            {/* Project Progress */}
            <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 12, padding: '16px' }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
                <span style={{ fontWeight: 700, fontSize: 14, color: 'var(--text)' }}>Project Progress</span>
                <span style={{ fontSize: 11, color: 'var(--primary)', cursor: 'pointer', fontWeight: 500 }}>All projects →</span>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                {PROJECTS.map((p, i) => (
                  <div key={i}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                      <span style={{ fontSize: 13, fontWeight: 500, color: 'var(--text)' }}>{p.name}</span>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                        <span style={{ fontSize: 11, color: 'var(--text3)' }}>{p.tasks} tasks</span>
                        <span style={{ fontSize: 12, fontWeight: 700, color: p.color }}>{p.progress}%</span>
                      </div>
                    </div>
                    <div style={{ height: 6, background: 'var(--bg3)', borderRadius: 6, overflow: 'hidden' }}>
                      <div style={{ height: '100%', width: `${p.progress}%`, background: p.color, borderRadius: 6 }}></div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Task Breakdown */}
            <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 12, padding: '16px' }}>
              <div style={{ marginBottom: 14 }}>
                <span style={{ fontWeight: 700, fontSize: 14, color: 'var(--text)' }}>Task Breakdown</span>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
                <div style={{ position: 'relative', flexShrink: 0 }}>
                  <svg width="100" height="100" viewBox="0 0 100 100">
                    {[
                      { pct: 28, color: '#a07de0', offset: 0  },
                      { pct: 38, color: '#5f1ee2', offset: 28 },
                      { pct: 14, color: '#f59e0b', offset: 66 },
                      { pct: 20, color: '#22c98a', offset: 80 },
                    ].map((seg, i) => {
                      const r = 38, circ = 2 * Math.PI * r;
                      const dash = (seg.pct / 100) * circ;
                      const rotate = (seg.offset / 100) * 360 - 90;
                      return (
                        <circle key={i} cx="50" cy="50" r={r} fill="none" stroke={seg.color}
                          strokeWidth="12" strokeDasharray={`${dash} ${circ}`}
                          style={{ transform: `rotate(${rotate}deg)`, transformOrigin: '50px 50px' }} />
                      );
                    })}
                    <text x="50" y="46" textAnchor="middle" fill="#f1eff5" fontSize="18" fontWeight="700" fontFamily="Inter">42</text>
                    <text x="50" y="58" textAnchor="middle" fill="#6b6382" fontSize="8" fontFamily="Inter">Total</text>
                  </svg>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8, flex: 1 }}>
                  {[
                    { label: 'To Do',       count: 12, pct: '28%', color: '#a07de0' },
                    { label: 'In Progress', count: 16, pct: '38%', color: '#5f1ee2' },
                    { label: 'Review',      count: 6,  pct: '14%', color: '#f59e0b' },
                    { label: 'Done',        count: 8,  pct: '20%', color: '#22c98a' },
                  ].map((item, i) => (
                    <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <div style={{ width: 8, height: 8, borderRadius: '50%', background: item.color, flexShrink: 0 }}></div>
                      <span style={{ fontSize: 12, color: 'var(--text2)', flex: 1 }}>{item.label}</span>
                      <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text)' }}>{item.count}</span>
                      <span style={{ fontSize: 11, color: 'var(--text3)', width: 32, textAlign: 'right' }}>{item.pct}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>

          </div>
          </>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
